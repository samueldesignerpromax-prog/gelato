<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio | Gelato Dreams - 70+ Sabores</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

<nav class="navbar">
    <div class="logo" onclick="location.href='index.html'">🍨 Gelato Dreams</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="sabores.html" class="active">Sabores 70+</a></li>
        <li><a href="combos.html">Combos</a></li>
        <li><a href="sobre.html">Sobre</a></li>
        <li><a href="contato.html">Contato</a></li>
        <li><a href="pedido.html">Pedido</a></li>
    </ul>
    <div class="nav-icons">
        <div class="cart-icon-btn" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            <span id="cartCount">0</span>
        </div>
        <button class="theme-toggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
    </div>
</nav>

<div class="cart-panel" id="cartPanel">
    <div class="cart-header">
        <h3><i class="fas fa-ice-cream"></i> Meu Carrinho</h3>
        <button onclick="toggleCart()" class="close-cart">✕</button>
    </div>
    <div id="cartItemsList"></div>
    <div class="cart-total">Total: R$ <span id="cartTotal">0.00</span></div>
    <button onclick="finalizeOrder()" class="btn-finalizar">Finalizar Pedido 🎉</button>
    <p id="orderMessage" class="order-msg"></p>
</div>

<main>
    <div class="container">
        <h1 class="page-title">🍧 Nosso Cardápio - 70+ Sabores Artesanais</h1>
        
        <!-- Filtros por categoria -->
        <div class="filters" id="filtersContainer">
            <button class="filter-btn active" data-categoria="todos">Todos</button>
            <button class="filter-btn" data-categoria="Tradicionais">🍫 Tradicionais</button>
            <button class="filter-btn" data-categoria="Gourmet">✨ Gourmet</button>
            <button class="filter-btn" data-categoria="Frutas">🍓 Frutas</button>
            <button class="filter-btn" data-categoria="Sobremesas">🍰 Sobremesas</button>
            <button class="filter-btn" data-categoria="Diferentões">🎭 Diferentões</button>
            <button class="filter-btn" data-categoria="Premium">💎 Premium</button>
            <button class="filter-btn" data-categoria="Veganos">🌱 Veganos</button>
        </div>

        <div id="saboresList" class="sabores-grid"></div>
    </div>
</main>

<footer class="footer">
    <p>🍦 Gelato Dreams - Sorveteria com Alma Colorida 🌈</p>
    <p>© 2024 - Mais de 70 sabores esperando por você!</p>
</footer>

<script src="carrinho.js"></script>
<script src="script.js"></script>
<script>
    // Inicializar página de sabores
    if (typeof carregarSabores === 'function') {
        carregarSabores();
    }
</script>
</body>
</html>
